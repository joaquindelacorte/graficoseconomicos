<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística de Granos | Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #1e293b;
            --soja: #22c55e;
            --trigo: #eab308;
            --maiz: #f97316;
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            color: var(--primary);
        }

        .dashboard {
            width: 95%;
            max-width: 1200px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .title-group h1 { 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: -0.025em;
            font-weight: 800;
        }

        .title-group p { 
            margin: 5px 0 0 0; 
            color: #64748b; 
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .online { background: #dcfce7; color: #166534; }
        .online::before { background: #22c55e; }
        
        .offline { background: #fee2e2; color: #991b1b; }
        .offline::before { background: #ef4444; }
        
        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
            margin-bottom: 30px;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-update:hover {
            background: #334155;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-update:active { transform: translateY(0); }

        /* Estilo para los tooltips */
        .chart-tooltip {
            background: rgba(30, 41, 59, 0.9) !important;
            border-radius: 8px !important;
            padding: 12px !important;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="title-group">
            <h1>Camiones en puerto</h1>
            <p>Monitoreo en tiempo real de ingreso de granos por terminal</p>
        </div>
        <div id="status" class="status-badge offline">SISTEMA OFFLINE</div>
    </header>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <button class="btn-update" onclick="updateData()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
            Actualizar Datos
        </button>
    </div>
</div>

<script>
    const N8N_URL = 'https://primary-production-110d9.up.railway.app/webhook/8d5486b1-c268-4970-b0a4-7f9a8f2499e4'; 
    
    // Registrar el plugin de etiquetas
    Chart.register(ChartDataLabels);

    let myChart;
    const statusBadge = document.getElementById('status');

    // Función para limpiar fechas (quita la parte T00:00:00...)
    const formatLabel = (dateStr) => {
        if(!dateStr) return '';
        return dateStr.split('T')[0];
    };

    async function updateData() {
        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error('Error en n8n');
            
            const data = await response.json();
            renderChart(data);
            
            statusBadge.innerText = 'SISTEMA ONLINE';
            statusBadge.className = 'status-badge online';
        } catch (err) {
            console.error(err);
            statusBadge.innerText = 'ERROR DE ENLACE';
            statusBadge.className = 'status-badge offline';
            loadDummyData();
        }
    }

    function renderChart(items) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        const labels = items.map(i => formatLabel(i.fecha));
        const soja = items.map(i => i.camiones_so_ja || i.camiones_soja); // Manejo de posibles typos
        const trigo = items.map(i => i.camiones_trigo);
        const maiz = items.map(i => i.camiones_maiz);

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Soja', data: soja, backgroundColor: '#22c55e', borderRadius: 4 },
                    { label: 'Trigo', data: trigo, backgroundColor: '#eab308', borderRadius: 4 },
                    { label: 'Maíz', data: maiz, backgroundColor: '#f97316', borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 30 } }, // Espacio para las etiquetas superiores
                scales: {
                    x: { 
                        stacked: true, 
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { weight: '600' } }
                    },
                    y: { 
                        stacked: true, 
                        beginAtZero: true,
                        grid: { color: '#f1f5f9' },
                        ticks: { color: '#64748b' }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        align: 'end',
                        labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { size: 12, weight: '600' } }
                    },
                    datalabels: {
                        anchor: 'end',
                        align: 'top',
                        color: '#1e293b',
                        font: { weight: 'bold', size: 13 },
                        formatter: (value, context) => {
                            // Solo mostramos el total en el último dataset (Maíz) para no repetir
                            if (context.datasetIndex === context.chart.data.datasets.length - 1) {
                                let sum = 0;
                                context.chart.data.datasets.forEach(dataset => {
                                    sum += dataset.data[context.dataIndex];
                                });
                                return sum.toLocaleString(); // El valor total arriba
                            }
                            return null; // No mostrar nada en las barras intermedias
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: (context) => `${context.dataset.label}: ${context.raw} camiones`
                        }
                    }
                }
            }
        });
    }

    function loadDummyData() {
        const dummy = [
            { fecha: '2026-04-05', camiones_soja: 231, camiones_trigo: 100, camiones_maiz: 944 },
            { fecha: '2026-04-06', camiones_soja: 155, camiones_trigo: 281, camiones_maiz: 1182 },
            { fecha: '2026-04-07', camiones_soja: 213, camiones_trigo: 299, camiones_maiz: 1963 },
            { fecha: '2026-04-08', camiones_soja: 282, camiones_trigo: 352, camiones_maiz: 2360 }
        ];
        renderChart(dummy);
    }

    updateData();
</script>

</body>
</html>
